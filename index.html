<style>
/* ================================================================
   TOKENS & DESIGN SYSTEM
================================================================ */
:root {
  --blue-primary: #0068B7;
  --blue-light:   #31ACE3;
  --teal:         #00A59E;
  --green-pale:   #C9E0B8;
  --purple-soft:  #A78EC3;
  --white:        #FFFFFF;
  --gray-light:   #D2D7DA;
  --gray-mid:     #828487;
  --gray-dark:    #222426;
  --bg:           #F9FAFB;

  /* Typography */
  --font-en-heading: "Open Sans", "Helvetica Neue", Helvetica, sans-serif;
  --font-en-body:    "Open Sans", "Helvetica Neue", Helvetica, sans-serif;
  --font-ja-heading: "Zen Kaku Gothic New", "Yu Gothic", "YuGothic", sans-serif;
  --font-ja-body:    "Zen Kaku Gothic New", "Yu Gothic", "YuGothic", sans-serif;
  --font: var(--font-ja-body);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%; height:100%; overflow:hidden;
  background:var(--white);
  font-family:var(--font);
  color:var(--gray-dark);
  -webkit-tap-highlight-color:transparent;
  user-select:none; touch-action:none;
}

/* ================================================================
   OPENING (OVERLAY)
================================================================ */
#opening{
  position:fixed;inset:0;z-index:200;
  background: var(--white);
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding: max(48px, env(safe-area-inset-top)) 40px max(40px, env(safe-area-inset-bottom));
  transition:opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  overflow:hidden;
}
#opening.gone{opacity:0; pointer-events:none;}

/* 背景: パレット5色を極薄く散らしたグラデーション */
#opening::before {
  content:'';
  position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 20%, rgba(49,172,227,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 85% 15%, rgba(167,142,195,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(0,165,158,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 55% 35% at 20% 85%, rgba(201,224,184,0.08) 0%, transparent 70%);
  pointer-events:none;
}

.o-top{
  position:relative; z-index:1;
  width:100%; display:flex; align-items:flex-start; justify-content:center;
  font-family: var(--font-ja-body);
  font-size:9px; font-weight:400; letter-spacing:0.04em;
  color: var(--gray-light);
  line-height: 1.7;
  text-align: center;
  flex-shrink: 0;
}
/* ルール線を廃止: 代わりに上部ラベルのみ */
.o-rule{ display:none; }

.o-visual{
  position:relative; z-index:1;
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  width:100%;
  min-height: 0;
  gap: 28px;
}
#o-canvas{
  display:block;
  flex-shrink:1;
  max-width: 100%;
  max-height: 40vh;
  /* キャラクターをわずかに沈ませて奥行き感 */
  filter: drop-shadow(0 8px 24px rgba(0,104,183,0.10));
}

.o-text{
  width:100%;
  text-align:center;
  animation: fadeUp 1.0s 0.15s ease both;
  flex-shrink: 0;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}

/* サブラベル */
.o-subtitle {
  font-family: var(--font-en-body);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.45em;
  color: var(--gray-light);
  text-transform: uppercase;
}

.o-title-ja {
  font-family: var(--font-ja-heading);
  font-size: clamp(28px, 11vw, 52px);
  font-weight: 700;
  line-height: 1.15;
  margin: 0;
  letter-spacing: 0.04em;
  white-space: nowrap;
  /* タイトルにパレットグラデーションを薄くかける */
  background: linear-gradient(135deg, var(--gray-dark) 0%, #3a4a5c 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.o-cta{
  position:relative; z-index:1;
  width:100%; display:flex; justify-content:center; align-items:center;
  animation: fadeUp 1.0s 0.35s ease both;
  flex-shrink: 0;
}

#o-btn {
  background: transparent;
  color: var(--blue-primary);
  padding: clamp(13px, 2vh, 17px) clamp(36px, 10vw, 64px);
  border-radius: 40px;
  border: 1.5px solid var(--blue-primary);
  cursor: pointer;
  font-family: var(--font-ja-heading);
  font-size: clamp(11px, 2vh, 14px);
  font-weight: 700;
  letter-spacing: 0.35em;
  text-indent: 0.35em;
  transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
}
/* ホバー: 塗りが満ちる */
#o-btn::before {
  content:'';
  position:absolute; inset:0;
  background: var(--blue-primary);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  z-index: -1;
}
#o-btn:hover {
  color: var(--white);
  border-color: var(--blue-primary);
  transform: none;
  box-shadow: 0 4px 20px rgba(0,104,183,0.18);
}
#o-btn:hover::before { transform: scaleX(1); }
#o-btn:active { transform: scale(0.97); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

/* ================================================================
   MAIN APP
================================================================ */
#main{
  position:fixed;inset:0;
  opacity:0; transition:opacity 1.2s ease;
  background: radial-gradient(circle at center, var(--white) 0%, var(--bg) 100%);
}
#main.visible{opacity:1;}

#canvas{display:block; position:absolute; inset:0;}
#touch{position:absolute; inset:0; z-index:5;}

#ui-controls{
  position:absolute;
  top:max(24px, env(safe-area-inset-top));
  left:max(24px, env(safe-area-inset-left));
  display:flex; flex-direction:column; gap:10px; z-index:10;
}
#ui-pop{
  display:flex; align-items:center; gap:10px; opacity:0.6;
}
.pop-dot { width:6px; height:6px; background:var(--blue-primary); border-radius:50%; }
.pop-label {
  font-family: var(--font-en-body);
  font-size:9px; font-weight:700; letter-spacing:0.4em;
}
.pop-val {
  font-family: var(--font-en-body);
  font-size:9px; color:var(--gray-dark); font-variant-numeric: tabular-nums;
}

/* ================================================================
   BOTTOM DOCK
================================================================ */
#bottom-dock {
  position: absolute;
  bottom: max(24px, env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 40px;
  padding: 10px 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
  border: 1px solid rgba(210,215,218,0.5);
}

.dock-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s;
  color: var(--gray-dark);
}
.dock-btn:hover { background: rgba(0,104,183,0.08); transform: scale(1.08); }
.dock-btn:active { transform: scale(0.95); }
.dock-btn svg { display:block; }

.dock-divider {
  width: 1px; height: 24px;
  background: var(--gray-light);
  flex-shrink: 0;
}

/* ================================================================
   SETTINGS OVERLAY
================================================================ */
#settings-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(34,36,38,0.35);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
#settings-overlay.open {
  opacity: 1; pointer-events: all;
}

#settings-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-radius: 24px 24px 0 0;
  padding: 0 0 max(24px, env(safe-area-inset-bottom)) 0;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 80vh;
  overflow-y: auto;
}
#settings-overlay.open #settings-panel {
  transform: translateY(0);
}

.settings-handle {
  width: 36px; height: 4px;
  background: var(--gray-light);
  border-radius: 2px;

.settings-section {

.settings-label {

/* Volume slider */
.vol-row {

}
.vol-val {

input[type=range].vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;

  cursor: pointer;
}
input[type=range].vol-slider::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--blue-primary); border: none;
  box-shadow: 0 2px 6px rgba(0,104,183,0.3);
}

/* Tempo toggle */
.tempo-toggle {
  display: flex; gap: 8px;
}
.tempo-btn {

  font-size: 12px; font-weight: 700;

}

// Inline Service Worker via Blob URL
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'komyaku-umi-v1';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
      if (res && res.status === 200 && e.request.method === 'GET') {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return res;
    }))
  );
});
`;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

  init() {
    if (this.initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();

    this.limiter = this.ctx.createDynamicsCompressor();
    this.limiter.threshold.setValueAtTime(-1.0, this.ctx.currentTime);
    this.limiter.knee.setValueAtTime(0, this.ctx.currentTime);
    this.limiter.ratio.setValueAtTime(20, this.ctx.currentTime);
    this.limiter.attack.setValueAtTime(0.003, this.ctx.currentTime);
    this.limiter.release.setValueAtTime(0.25, this.ctx.currentTime);

    this.mainGain = this.ctx.createGain();
    this.mainGain.gain.value = dbToGain(CONFIG.AUDIO.VOLUMES.MASTER) * this.masterVolume;

    this.isolatorHPF = this.ctx.createBiquadFilter();
    this.isolatorHPF.type = 'highpass';
    this.isolatorHPF.frequency.setValueAtTime(50, this.ctx.currentTime);
    this.isolatorHPF.Q.setValueAtTime(0.7, this.ctx.currentTime);

    this.limiter.connect(this.mainGain);
    this.mainGain.connect(this.isolatorHPF);
    this.isolatorHPF.connect(this.ctx.destination);

    this.reverbGain = this.ctx.createGain();
    this.reverbGain.gain.value = CONFIG.AUDIO.REVERB_MIX;
    this.convolver = this.ctx.createConvolver();
    this.updateReverbBuffer(CONFIG.AUDIO.REVERB_DECAY);

    this.reverbGain.connect(this.convolver);
    this.convolver.connect(this.limiter);

    const sampleRate = this.ctx.sampleRate;
    const buffer = this.ctx.createBuffer(1, sampleRate * 0.5, sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < buffer.length; i++) {
      const t = i / sampleRate;
      data[i] = (Math.sin(2 * Math.PI * 440 * t) * Math.exp(-15 * t)) +
                (Math.sin(2 * Math.PI * 1320 * t) * 0.3 * Math.exp(-30 * t)) +
                (Math.random() * 0.02 * Math.exp(-60 * t));
    }
    this.granularBuffer = buffer;

    this.bassSaturation = this.ctx.createWaveShaper();
    this.updateSaturationCurve(CONFIG.AUDIO.BASS_PARAMS.saturation);

    this.bassFilter = this.ctx.createBiquadFilter();
    this.bassFilter.type = 'lowpass';
    this.bassFilter.Q.value = CONFIG.AUDIO.BASS_PARAMS.resonance;
    this.bassFilter.frequency.value = CONFIG.AUDIO.BASS_PARAMS.cutoff;

    this.globalPhaser = this.createBpmSyncedPhaser(CONFIG.BPM);

    this.bassSaturation.connect(this.bassFilter);
    this.bassFilter.connect(this.globalPhaser.input);

    this.initialized = true;
  }

  setMasterVolume(v) {
    // v: 0-1
    this.masterVolume = v;
    if (this.mainGain) {
      const targetGain = dbToGain(CONFIG.AUDIO.VOLUMES.MASTER) * v;
      this.mainGain.gain.setTargetAtTime(targetGain, this.ctx.currentTime, 0.05);
    }
  }

  updateSaturationCurve(amount) {
    if (!this.bassSaturation) return;
    const curve = new Float32Array(44100);
    for (let i = 0; i < 44100; i++) {
      const x = (i * 2) / 44100 - 1;
      curve[i] = (Math.PI / 2 * Math.atan(x * amount)) / (Math.PI / 2);
    }
    this.bassSaturation.curve = curve;
  }

  updateReverbBuffer(duration) {
    const sampleRate = this.ctx.sampleRate;
    const length = sampleRate * duration;
    const impulse = this.ctx.createBuffer(2, length, sampleRate);
    for (let i = 0; i < 2; i++) {
      const channelData = impulse.getChannelData(i);
      for (let j = 0; j < length; j++) {
        channelData[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 2.0);
      }
    }
    this.convolver.buffer = impulse;
  }

  createBpmSyncedPhaser(bpm) {
    const input = this.ctx.createGain();
    const dryGain = this.ctx.createGain();
    const wetGain = this.ctx.createGain();
    const output = this.ctx.createGain();
    const feedback = this.ctx.createGain();

    dryGain.gain.value = 0.5;
    wetGain.gain.value = 0.5;
    feedback.gain.value = 0.2;

    const filters = Array.from({ length: 4 }, () => {
      const f = this.ctx.createBiquadFilter();
      f.type = 'allpass';
      f.frequency.value = 1000;
      return f;
    });

    const lfo = this.ctx.createOscillator();
    const lfoDepth = this.ctx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = 0.1;
    lfoDepth.gain.value = 600;

    lfo.connect(lfoDepth);
    input.connect(dryGain);
    input.connect(filters[0]);
    filters[3].connect(feedback);
    feedback.connect(filters[0]);

    filters.forEach((f, i) => {
      lfoDepth.connect(f.frequency);
      if (i < filters.length - 1) filters[i].connect(filters[i + 1]);
    });

    filters[3].connect(wetGain);
    dryGain.connect(output);
    wetGain.connect(output);

    lfo.start();
    return { input, output, lfo, lfoDepth, feedback };
  }

  // ★ Join時のホット/コールド対応版: freqを受け取ってそのまま演奏
  _playWithResonance(playFn, freq, time, visibility, panner, isJoin, colorKey) {
    if (visibility <= 0.01) return;
    playFn(freq, time, visibility, panner);
    if (isJoin) {
      let resFreq;
      if (colorKey === 'PURPLE') {
        resFreq = freq * 2.0;
      } else {
        resFreq = this.scale[Math.floor(Math.random() * this.scale.length)] * 2.0;
      }
      playFn(resFreq, time + 0.005, visibility * 0.4, panner);
    }
  }

  // 逆キーフォロー: 基準周波数E2(82.4Hz)からの比率でカットオフを下げる
  _reverseKeyFollow(freq, baseCutoff, refFreq = 82.4, depth = 0.6) {
    // 高域に行くほどカットオフを下げる（最大depth倍まで低下）
    const ratio = Math.log2(freq / refFreq); // オクターブ数
    const follow = Math.max(1 - depth, 1 - ratio * 0.15);
    return Math.max(200, baseCutoff * follow);
  }

  playPiano(freq, time, visibility, panner) {
    const now = time;
    const baseVolume = dbToGain(CONFIG.AUDIO.VOLUMES.PIANO);
    const p = CONFIG.AUDIO.SOUND_PARAMS.PIANO;

    const fmRatio = 2.0;
    const fmIndex = p.egDepth; // FMインデックス

    const modOsc = this.ctx.createOscillator();
    const modEnv = this.ctx.createGain();
    const modGain = this.ctx.createGain();
    modOsc.type = 'sine';
    modOsc.frequency.value = freq * fmRatio;
    modEnv.gain.setValueAtTime(0, now);
    modEnv.gain.linearRampToValueAtTime(freq * fmIndex, now + 0.005);
    modEnv.gain.exponentialRampToValueAtTime(freq * fmIndex * 0.15, now + 0.3);
    modEnv.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
    modGain.gain.value = 1.0;
    modOsc.connect(modEnv);
    modEnv.connect(modGain);

    const carOsc = this.ctx.createOscillator();
    carOsc.type = 'sine';
    carOsc.frequency.value = freq;
    modGain.connect(carOsc.frequency);

    const lpf = this.ctx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 3200;
    lpf.Q.value = 0.5;
    lpf.connect(panner);

    const carEnv = this.ctx.createGain();
    carEnv.gain.setValueAtTime(0, now);
    carEnv.gain.linearRampToValueAtTime(baseVolume * visibility, now + 0.012);
    carEnv.gain.exponentialRampToValueAtTime(baseVolume * visibility * 0.4, now + 0.25);
    carEnv.gain.exponentialRampToValueAtTime(0.001, now + 2.2);

    carOsc.connect(carEnv);
    carEnv.connect(lpf);

    modOsc.start(now); modOsc.stop(now + 2.3);
    carOsc.start(now); carOsc.stop(now + 2.3);

    const attackSource = this.ctx.createBufferSource();
    attackSource.buffer = this.granularBuffer;
    attackSource.playbackRate.value = freq / 440;
    const attackEnv = this.ctx.createGain();
    attackEnv.gain.setValueAtTime(0, now);
    attackEnv.gain.linearRampToValueAtTime(baseVolume * 0.8 * visibility, now + 0.002);
    attackEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    attackSource.connect(attackEnv);
    attackEnv.connect(panner);
    attackSource.start(now, 0, 0.08);
  }

  playMarimba(freq, time, visibility, panner) {
    const now = time;
    const baseVolume = dbToGain(CONFIG.AUDIO.VOLUMES.MARIMBA);
    const p = CONFIG.AUDIO.SOUND_PARAMS.MARIMBA;

    const cutoff = 4000;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = 0.7;
    filter.frequency.setValueAtTime(cutoff * p.egDepth, now);
    filter.frequency.exponentialRampToValueAtTime(cutoff, now + 0.04);
    filter.connect(panner);

    for (let i = 0; i < 2; i++) {
      const source = this.ctx.createBufferSource();
      source.buffer = this.granularBuffer;
      source.playbackRate.value = freq / 440;
      const env = this.ctx.createGain();
      const grainTime = now + (i * 0.005);
      env.gain.setValueAtTime(0, grainTime);
      env.gain.linearRampToValueAtTime(baseVolume * 2 * visibility, grainTime + 0.002);
      env.gain.exponentialRampToValueAtTime(0.01, grainTime + 0.3);
      source.connect(env);
      env.connect(filter);
      source.start(grainTime, 0, 0.4);
    }
  }

  playElectricBass(freq, time, visibility, panner) {
    const now = time;
    const baseVolume = dbToGain(CONFIG.AUDIO.VOLUMES.BASS);
    const p = CONFIG.AUDIO.SOUND_PARAMS.BASS;

    const sawOsc = this.ctx.createOscillator();
    sawOsc.type = 'sawtooth';
    sawOsc.frequency.setValueAtTime(freq, now);

    const env = this.ctx.createGain();
    const atk = Math.max(0.002, CONFIG.AUDIO.BASS_PARAMS.attack);
    const dec = Math.max(0.01, CONFIG.AUDIO.BASS_PARAMS.decay);
    const totalDuration = atk + dec;

    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(baseVolume * visibility, now + atk);
    env.gain.exponentialRampToValueAtTime(0.0001, now + totalDuration);
    env.gain.setValueAtTime(0, now + totalDuration + 0.005);

    const baseCut = CONFIG.AUDIO.BASS_PARAMS.cutoff;
    const egIntensity = p.egDepth;

    this.bassFilter.frequency.cancelScheduledValues(now);
    this.bassFilter.frequency.setValueAtTime(baseCut, now);
    this.bassFilter.frequency.linearRampToValueAtTime(baseCut * (1 + egIntensity), now + atk);
    this.bassFilter.frequency.setTargetAtTime(baseCut, now + atk, dec * 0.4);

    const route = this.ctx.createGain();
    route.gain.setValueAtTime(1, now);

    sawOsc.connect(env);
    env.connect(this.bassSaturation);
    this.globalPhaser.output.connect(route);

    route.connect(panner);
    if (CONFIG.AUDIO.BASS_PARAMS.reverbOn) {
      route.connect(this.reverbGain);
    }

    sawOsc.start(now);
    sawOsc.stop(now + totalDuration + 0.1);

    setTimeout(() => {
      try {
        this.globalPhaser.output.disconnect(route);
        route.disconnect(panner);
        if (CONFIG.AUDIO.BASS_PARAMS.reverbOn) route.disconnect(this.reverbGain);
      } catch(e){}
    }, (totalDuration + 0.2) * 1000);
  }
}

   ENGINE & ENTITIES
================================================================ */
let W, H, dpr, ctx;
let entities = [];
let ft = 0;
let lastAuto = 0;
let lastNushiCheck = 0; // ヌシ専用スポーン判定タイマー（こみゃく満員時の毎フレーム判定を防ぐ）
let running = false;
let maxPopAdjusted = CONFIG.MAX_POP_BASE;

const getBPMFreq = (multiplier = 1) => (CONFIG.BPM / 60) * multiplier;

const getOutwardEyeMotion = (t, offset = 0) => {
  const freq = getBPMFreq(1/16);
  const driftX = Math.sin(t * freq * Math.PI * 2 + offset) * 0.45;
  const driftY = Math.cos(t * freq * 0.8 * Math.PI * 2 + offset * 1.5) * 0.45;
  const baseAng = offset;
  const ex = Math.cos(baseAng) * 0.8 + driftX;
  const ey = Math.sin(baseAng) * 0.8 + driftY;
  const len = Math.hypot(ex, ey);
  if (len > 1) return { ex: ex / len, ey: ey / len };
  return { ex, ey };
};

/* ================================================================
   JOIN SEQUENCE: HOT/COLD FREQUENCY POOL
================================================================ */
class FrequencyPool {
  // 各個体が独立して持つホット/コールド管理プール
  constructor(scale) {
    this.scale = scale;
    // hot[i] = 残りクールダウン周期数（0 = コールド）
    this.hot = new Array(scale.length).fill(0);
  }

  // コールドな音階インデックスの一覧を返す
  getCold() {
    return this.hot.map((h, i) => h <= 0 ? i : -1).filter(i => i >= 0);
  }

  // 1周期分クールダウン
  tick() {
    this.hot = this.hot.map(h => Math.max(0, h - 1));
  }

  // 使用した音階インデックスをホットにマーク（次の1周期は使わない）
  markHot(idx) {
    this.hot[idx] = 1;
  }

  // トニック(E)インデックス: スケール内の最初のE = index 0
  getTonicIdx() { return 0; }

  // コールドプールからランダム選択。なければトニック
  pickCold(excludeTonic = false) {
    let pool = this.getCold();
    if (excludeTonic) pool = pool.filter(i => i !== 0);
    if (pool.length === 0) {
      // 全部ホットならトニックをフォールバック
      return excludeTonic ? (this.getCold()[0] ?? 0) : 0;
    }
    const idx = pool[Math.floor(Math.random() * pool.length)];
    return idx;
  }
}

/* ================================================================
   PARTICLE SYSTEM（泡パーティクル）
================================================================ */
let particles = [];

class Bubble {
  constructor(x, y, color, eyeR) {
    this.x = x;
    this.y = y;
    this.color = color;
    // 瞳サイズ程度（eyeR * 0.3 〜 1.0 のランダム）
    this.r = eyeR * (0.3 + Math.random() * 0.7);
    this.alpha = 0.55 + Math.random() * 0.3;
    // じわっと上昇: 速度は小さく、ゆっくり
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = -(0.25 + Math.random() * 0.35); // 上方向
    this.life = 0;
    this.maxLife = 80 + Math.random() * 60; // フレーム数
  }

  update() {
    this.life++;
    this.x += this.vx;
    this.y += this.vy;
    // 上昇しながら横にも微妙に揺れる
    this.vx += Math.sin(this.life * 0.18) * 0.018;
    // フェードアウト: 後半から透明に
    const progress = this.life / this.maxLife;
    this.alpha = (1 - progress) * (0.55 + Math.random() * 0.05);
    // 少し膨らんで消える
    this.r += 0.018;
  }

  draw(targetCtx) {
    if (this.alpha <= 0) return;
    targetCtx.save();
    targetCtx.globalAlpha = Math.max(0, this.alpha);
    targetCtx.beginPath();
    targetCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    targetCtx.fillStyle = this.color;
    targetCtx.fill();
    targetCtx.restore();
  }

  get dead() { return this.life >= this.maxLife; }
}

function emitBubbles(x, y, color, eyeR, count = 1) {
  for (let i = 0; i < count; i++) {
    particles.push(new Bubble(
      x + (Math.random() - 0.5) * eyeR * 2,
      y + (Math.random() - 0.5) * eyeR * 2,
      color,
      eyeR
    ));
  }
}

const NUSHI_CHORDS = [

/* ================================================================
   NUSHI（テスト用: 大きめのこみゃくとして中央出現）
================================================================ */
const NUSHI_SPAWN_PROBABILITY = 0.15;

// ヌシのサイズ: 画面短辺の38〜48%（個体差あり、直径で76〜96%程度）
function getNushiR() {
  return Math.min(W, H) * (0.38 + Math.random() * 0.10);
}

class Nushi {
  constructor() {
    this.x = W / 2;
    this.y = H / 2;
    this.r = getNushiR();
    this.vx = (Math.random() - 0.5) * 0.2;
    this.vy = (Math.random() - 0.5) * 0.2;
    // ★ Komyaku同様にランダムカラー選択
    const keys = ['BLUE_P', 'BLUE_L', 'TEAL', 'GREEN', 'PURPLE'];
    const counts = {};
    keys.forEach(k => counts[k] = 0);
    entities.forEach(e => { if (e.state !== 'integrated') counts[e.colorKey]++; });
    this.colorKey = keys.sort((a, b) => counts[a] - counts[b])[0];
    this.color = PALETTE[this.colorKey];
    this.seed = Math.random() * Math.PI * 2;
    this.state = 'born';
    this.scale = 0;
    this.alpha = 1;
    this.startTime = performance.now();
    this.maxAge = (45 + Math.random() * 40) * (1000 * (60 / CONFIG.BPM)); // 平均65拍（約2/3）
    this.currentPulse = 1;
    this.partner = null;

    // オーディオ
    this.lastStep = -1;
    this.measureCount = 0;    // 小節カウンタ
    this.progressionPos = 0;  // 進行内の位置（0=E固定スタート）
    this.chordProgression = this._buildProgression();
    this.panner = null;
    this.fadeGain = null;     // アルファ同期フェードゲイン

    if (audio.initialized) {
      this.panner = audio.ctx.createPanner();
      this.panner.panningModel = 'equalpower';
      // Komyakuと同一経路: panner → volumeGain → limiter → mainGain → isolatorHPF
      this.volumeGain = audio.ctx.createGain();
      this.volumeGain.gain.value = 0; // born時はゼロ、alphaに同期してフェードイン
      this.panner.connect(this.volumeGain);
      this.volumeGain.connect(audio.limiter);
      this.volumeGain.connect(audio.reverbGain);
    }
  }

  // ★ コード進行構築: Eを先頭固定、残り4コード(Esus4/Eadd9/C#m7/Aadd9)をシャッフル
  _buildProgression() {
    const rest = [1, 2, 3, 4];
    for (let i = rest.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [rest[i], rest[j]] = [rest[j], rest[i]];
    }
    return [0, ...rest];
  }

  update() {
    const now = performance.now();
    const t_sec = ft * 0.001;
    const bpmFreq = getBPMFreq(0.5);
    this.currentPulse = 1 + Math.sin(t_sec * bpmFreq * Math.PI * 2 + this.seed) * 0.012;

    if (this.state === 'born') {
      const elapsed = now - this.startTime;
      this.scale = Math.min(1, elapsed / 2500); // ゆっくり出現
      if (this.scale >= 1) {
        this.state = 'live';
        nushiLog(`[NUSHI] born→live at ${(now/1000).toFixed(1)}s, maxAge=${(this.maxAge/1000).toFixed(1)}s`);
      }
    } else if (this.state === 'live') {
      if (now - this.startTime > this.maxAge) {
        this.state = 'returning';
        this.returnStartTime = now;
        nushiLog(`[NUSHI] live→returning at ${(now/1000).toFixed(1)}s (lived ${((now-this.startTime)/1000).toFixed(1)}s)`);
      }
    } else if (this.state === 'returning') {
      const progress = Math.min(1, (now - this.returnStartTime) / 4000);
      this.alpha = 1 - progress;
      this.scale = 1 - progress * 0.2;
      if (progress >= 1) {
        this.state = 'integrated';
        nushiLog(`[NUSHI] returning→integrated at ${(now/1000).toFixed(1)}s (total lifetime ${((now-this.startTime)/1000).toFixed(1)}s)`);
      }
    }

    // 中央付近をゆっくり漂う
    const driftT = t_sec * CONFIG.PHYSICS.DRIFT_FREQ_BASE * 0.5;
    this.vx += Math.sin(driftT + this.seed) * 0.008;
    this.vy += Math.sin(driftT * 0.7 + this.seed * 1.2) * 0.008;
    // 中央への引力（画面中央付近に滞留）
    const cx = W / 2, cy = H / 2;
    const dxC = cx - this.x, dyC = cy - this.y;
    const distC = Math.hypot(dxC, dyC);
    if (distC > 80) {
      this.vx += (dxC / distC) * 0.015;
      this.vy += (dyC / distC) * 0.015;
    }
    this.vx *= 0.98; this.vy *= 0.98;
    this.x += this.vx; this.y += this.vy;

    // volumeGainをアルファと同期（+6dBブースト込み）
    if (audio.initialized && this.volumeGain) {
      const targetGain = this.alpha * dbToGain(CONFIG.AUDIO.VOLUMES.NUSHI_BOOST);
      this.volumeGain.gain.setTargetAtTime(targetGain, audio.ctx.currentTime, 0.8);
    }

    // 和音シーケンス（8分音符パルス）- born中も発音、常に鳴らす
    if (audio.initialized && this.panner && isPlaying) {
      const nowCtx = audio.ctx.currentTime;
      const beatInterval = audio.eighthNote;
      const currentStepTotal = Math.floor(nowCtx / beatInterval);
      const stepInMeasure = currentStepTotal % 8; // 8ステップ = 1小節

      if (this.lastStep !== currentStepTotal) {
        this.lastStep = currentStepTotal;

        // 1小節ごとにコード遷移
        if (stepInMeasure === 0) {
          this.measureCount++;
          if (this.measureCount > 1) { // 最初の小節はE(固定)のまま
            this.progressionPos++;
            if (this.progressionPos >= this.chordProgression.length) {
              // 1周終了: 次の周はEから再スタート + 残り4コードを再シャッフル
              this.progressionPos = 0;
              this.chordProgression = this._buildProgression();
            }
          }
        }

        // 毎8分音符でコードを鳴らす
        const chord = NUSHI_CHORDS[this.chordProgression[this.progressionPos]];
        const schedTime = currentStepTotal * beatInterval;
        this.panner.setPosition((this.x / W) * 2 - 1, 0, 1.0);
        this._playChord(chord, schedTime);

        // ★ 泡パーティクル（発音ごとに2〜3個、ヌシのサイズに応じた泡）
        const eyeRForBubble = this.collisionR * 0.6;
        emitBubbles(this.x, this.y, this.color, eyeRForBubble, 2 + Math.floor(Math.random() * 2));
      }
    }
  }

  _playChord(chord, time) {
    const ctx = audio.ctx;
    const now = time;
    const baseVol = dbToGain(-10); // 全パート統一

    const isPiano   = (this.colorKey === 'BLUE_P' || this.colorKey === 'BLUE_L');
    const isMarimba = (this.colorKey === 'TEAL'   || this.colorKey === 'GREEN');
    const isBass    = (this.colorKey === 'PURPLE');

    // ★ ヌシの音域: 低音色は高域へ、高音色は低域へ広げる
    // 各色につき2つの倍率を持ち、低域・高域の両方を同時に鳴らす
    let octMults;
    if (this.colorKey === 'BLUE_P')  octMults = [0.5, 2.0];   // E2 + E4
    if (this.colorKey === 'BLUE_L')  octMults = [1.0, 3.0];   // E3 + E5(少し下)
    if (this.colorKey === 'TEAL')    octMults = [1.0, 4.0];   // E3 + E5
    if (this.colorKey === 'GREEN')   octMults = [0.75, 3.0];  // E2-3中間 + E4-5中間
    if (this.colorKey === 'PURPLE')  octMults = [0.5, 2.0];   // E2 + E4

    chord.freqs.forEach((freq, i) => {
      const volScale = 1 - i * 0.07; // 上声部ほど少し小さく

      octMults.forEach((mult, mIdx) => {
        const f = freq * mult;
        const volFactor = mIdx === 0 ? 1.0 : 0.6; // 低域メイン、高域サブ

        if (isBass) {
          const bFilter = ctx.createBiquadFilter();
          bFilter.type = 'lowpass';
          bFilter.Q.value = CONFIG.AUDIO.BASS_PARAMS.resonance;
          const egInt = CONFIG.AUDIO.SOUND_PARAMS.BASS.egDepth;
          const baseCut = CONFIG.AUDIO.BASS_PARAMS.cutoff;
          const atk = 0.01, dec = 0.5;
          bFilter.frequency.setValueAtTime(baseCut, now);
          bFilter.frequency.linearRampToValueAtTime(baseCut * (1 + egInt), now + atk);
          bFilter.frequency.setTargetAtTime(baseCut, now + atk, dec * 0.4);
          bFilter.connect(this.panner);

          const sawOsc = ctx.createOscillator();
          sawOsc.type = 'sawtooth';
          sawOsc.frequency.value = f;
          const env = ctx.createGain();
          env.gain.setValueAtTime(0, now);
          env.gain.linearRampToValueAtTime(baseVol * volScale * volFactor, now + atk);
          env.gain.exponentialRampToValueAtTime(0.0001, now + atk + dec);
          sawOsc.connect(env);
          env.connect(bFilter);
          sawOsc.start(now); sawOsc.stop(now + atk + dec + 0.05);

        } else if (isMarimba) {
          if (!audio.granularBuffer) return;
          const cutoff = 4000;
          const mFilter = ctx.createBiquadFilter();
          mFilter.type = 'lowpass';
          mFilter.Q.value = 0.7;
          mFilter.frequency.setValueAtTime(cutoff * CONFIG.AUDIO.SOUND_PARAMS.MARIMBA.egDepth, now);
          mFilter.frequency.exponentialRampToValueAtTime(Math.max(cutoff, 20), now + 0.04);
          mFilter.connect(this.panner);

          const src = ctx.createBufferSource();
          src.buffer = audio.granularBuffer;
          src.playbackRate.value = f / 440;
          const env = ctx.createGain();
          const grainTime = now + i * 0.006;
          env.gain.setValueAtTime(0, grainTime);
          env.gain.linearRampToValueAtTime(baseVol * volScale * volFactor, grainTime + 0.002);
          env.gain.exponentialRampToValueAtTime(0.01, grainTime + 0.35);
          src.connect(env);
          env.connect(mFilter);
          src.start(grainTime, 0, 0.4);

        } else {
          // ピアノ系
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = f;
          const env = ctx.createGain();
          const atk = 0.01, rel = 0.6;
          env.gain.setValueAtTime(0, now);
          env.gain.linearRampToValueAtTime(baseVol * volScale * volFactor, now + atk);
          env.gain.exponentialRampToValueAtTime(0.0001, now + atk + rel);
          osc.connect(env);
          env.connect(this.panner);
          osc.start(now); osc.stop(now + atk + rel + 0.05);

          // アタックトランジェント（低域声部のみ）
          if (audio.granularBuffer && i === 0 && mIdx === 0) {
            const src = ctx.createBufferSource();
            src.buffer = audio.granularBuffer;
            src.playbackRate.value = f / 440;
            const aEnv = ctx.createGain();
            aEnv.gain.setValueAtTime(0, now);
            aEnv.gain.linearRampToValueAtTime(baseVol * 1.2, now + 0.002);
            aEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            src.connect(aEnv);
            aEnv.connect(this.panner);
            src.start(now, 0, 0.1);
          }
        }
      });
    });
  }

  get collisionR() {
    const svgMaxDim = Math.max(945, 787);
    const scale = (this.r * 2 * this.scale * this.currentPulse) / svgMaxDim;
    return 29.2 * scale;
  }

let nushi = null; // シングルトン

function trySpawnNushi() {
  if (nushi && nushi.isAlive) return;
  const roll = Math.random();
  const now = (performance.now()/1000).toFixed(1);
  if (roll < NUSHI_SPAWN_PROBABILITY) {
    nushiLog(`[NUSHI] spawn check at ${now}s: roll=${roll.toFixed(4)} < ${NUSHI_SPAWN_PROBABILITY} → SPAWN`);
    nushi = new Nushi();
    // audio初期化済みだがコンストラクタ内でpannerが未作成の場合の保険
    if (audio.initialized && !nushi.panner) {
      nushi.panner = audio.ctx.createPanner();
      nushi.panner.panningModel = 'equalpower';
      nushi.volumeGain = audio.ctx.createGain();
      nushi.volumeGain.gain.value = 0;
      nushi.panner.connect(nushi.volumeGain);
      nushi.volumeGain.connect(audio.limiter);
      nushi.volumeGain.connect(audio.reverbGain);
    }
  } else {
    // skip
  }
}

    this.colorKey = colorKey || 'BLUE_P';
    this.color = PALETTE[this.colorKey];
    this.startTime = performance.now();
    this.maxAge = (30 + Math.random() * 30) * (1000 * (60 / CONFIG.BPM)); // 平均45拍（約2/3）
    this.state = 'born';
    this.scale = 0;
    this.alpha = 1;
    this.seed = Math.random() * Math.PI * 2;
    this.dividing = 0;
    this.joinEnergy = 0;
    this.resonance = 0;
    this.targetResonance = 0;
    this.isJoinCandidate = false;
    this.rhythmPattern = this.generateRhythm();
    this.partner = null;
    this.lastStep = -1;
    this.lastBreakTime = 0;
    this.lastBeatTime = 0;
    this.joinTime = 0; // Join成立時刻（経過時間で視線ブレンドを変化させる）
    this.panner = null;

    this.isUrchin = false;

    // ★ Join時のホット/コールド音階プール（個体ごとに独立）
    this.freqPool = new FrequencyPool(E_MAJOR_SCALE);
    this.lastPoolTickStep = -1;

    // ★ パープル（ベース）のJoin時シーケンス用
    this.bassPattern = null;
    this.bassPatternStep = 0;
    this.generateBassPattern();

    if (!isInitial) {
      const prob = isFromDivision ? CONFIG.URCHIN_DIVIDE_PROBABILITY : CONFIG.URCHIN_PROBABILITY;
      if (Math.random() < prob) {
        this.isUrchin = true;
      }
    }

    if (audio.initialized) {
      this.panner = audio.ctx.createPanner();
      this.panner.panningModel = 'equalpower';
      // 統一経路: panner → volumeGain → limiter → mainGain → isolatorHPF
      this.volumeGain = audio.ctx.createGain();
      this.volumeGain.gain.value = 1.0;
      this.panner.connect(this.volumeGain);
      this.volumeGain.connect(audio.limiter);
      this.volumeGain.connect(audio.reverbGain);
    }
  }

  get isRare() {
    return this.isUrchin;
  }

  generateRhythm() {
    const dens = (this.colorKey === 'PURPLE' || this.colorKey.startsWith('BLUE')) ? 0.4 : 0.7;
    return Array.from({length: 8}, () => (Math.random() > dens ? 1 : 0));
  }

  // ★ ベースJoinパターン生成: E音を軸にした動きのあるラインを8ステップで生成
  generateBassPattern() {
    // bassDegrees: ルート(0), 5度(4=B), 4度(3=A), 短3度(6=D#)など
    const degrees = [0, 0, 4, 3, 0, 4, 6, 3];
    // ランダムにシャッフルしてバリエーション
    for (let i = degrees.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [degrees[i], degrees[j]] = [degrees[j], degrees[i]];
    }
    // ただしステップ0はルート(0)固定
    degrees[0] = 0;
    this.bassPattern = degrees;
  }

  // ★ Join時の音階選択（ホット/コールド方式）
  selectJoinFreq(isStrongBeat) {
    // 周期tick: 8ステップごとにプールを1ティック進める（今回は毎ステップtick）
    this.freqPool.tick();

    if (isStrongBeat) {
      // 強拍: トニック(E)を優先。もしトニックがホットならコールドプールから
      const tonicIdx = this.freqPool.getTonicIdx();
      let idx;
      if (this.freqPool.hot[tonicIdx] <= 0) {
        idx = tonicIdx;
      } else {
        idx = this.freqPool.pickCold(false);
      }
      this.freqPool.markHot(idx);
      return idx;
    } else {
      // 弱拍・休符: トニック以外のコールドから選ぶ
      const idx = this.freqPool.pickCold(true);
      this.freqPool.markHot(idx);
      return idx;
    }
  }

  // ★ 周囲の同色個体が存在するか
  hasSameColorNeighbor() {
    return entities.some(e => e !== this && e.state !== 'integrated' && e.colorKey === this.colorKey);
  }

  update() {
    const now = performance.now();
    const nowCtx = audio.ctx ? audio.ctx.currentTime : 0;
    const t_sec = ft * 0.001;
    const bpmFreq = getBPMFreq(0.5);
    this.currentPulse = 1 + Math.sin(t_sec * bpmFreq * Math.PI * 2 + this.seed) * 0.012;

    if (this.isRare && this.partner) {
      this.breakJoin();
    }

    if (this.state === 'born') {
      const elapsed = now - this.startTime;
      this.scale = Math.min(1, elapsed / 1500);
      if (this.scale >= 1) this.state = 'live';
    } else if (this.state === 'live') {
      const lifeElapsed = now - this.startTime;
      if (lifeElapsed > this.maxAge) {
        this.state = 'returning';
        this.returnStartTime = now;
      }
      // 同色が既に2体以上いる場合は分裂しない
      const sameColorCount = entities.filter(e => e.state !== 'integrated' && e.colorKey === this.colorKey).length;
      if (entities.length < maxPopAdjusted && sameColorCount < 2 && Math.random() < CONFIG.AUTO_DIVIDE_PROBABILITY) {
        this.initiateAutoDivision();
      }
    } else if (this.state === 'returning') {
      const returnElapsed = now - this.returnStartTime;
      const progress = Math.min(1, returnElapsed / 3000);
      this.alpha = 1 - progress;
      this.scale = 1 - progress * 0.3;
      if (progress >= 1) {
        this.state = 'integrated';
        this.breakJoin();
      }
    }

    const targetJoinEnergy = this.partner ? 1.4 : 0;
    this.joinEnergy += (targetJoinEnergy - this.joinEnergy) * 0.08;

    // Join状態に応じた音量ブースト
    if (audio.initialized && this.volumeGain) {
      const targetVol = this.partner
        ? dbToGain(CONFIG.AUDIO.VOLUMES.JOIN_BOOST)
        : 1.0;
      this.volumeGain.gain.setTargetAtTime(targetVol, audio.ctx.currentTime, 0.3);
    }

    if (this.targetResonance > this.resonance) {
      this.resonance += (this.targetResonance - this.resonance) * 0.08;
    } else {
      this.resonance *= 0.96;
    }

    if (this.dividing > 0) this.dividing -= 0.02;

    // --- Audio sequencing ---
    if (audio.initialized && this.panner && isPlaying) {
      const visibility = (this.state === 'born' ? this.scale : this.alpha) * 0.6;
      const beatInterval = audio.eighthNote;
      const currentStepTotal = Math.floor(nowCtx / beatInterval);
      const stepInMeasure = currentStepTotal % 8;

      if (this.lastStep !== currentStepTotal) {
        this.lastStep = currentStepTotal;
        if (stepInMeasure === 0 && Math.random() > 0.8) this.rhythmPattern = this.generateRhythm();

        if (stepInMeasure === 0 && !this.isRare && (this.partner || this.isJoinCandidate)) {
          this.targetResonance = 1.0;
        } else if (stepInMeasure === 2) {
          this.targetResonance = 0;
        }

        const trigger = this.rhythmPattern[stepInMeasure];
        const schedTime = currentStepTotal * beatInterval;
        this.panner.setPosition((this.x / W) * 2 - 1, 0, 1.0);
        const sizeFactor = 1.0 - ((this.r - CONFIG.R_MIN) / (CONFIG.R_MAX - CONFIG.R_MIN));
        const isJoin = !!this.partner;
        const hasSameNeighbor = isJoin ? this.hasSameColorNeighbor() : false;

        if (trigger > 0) {
          this.lastBeatTime = now;

          // ★ 泡パーティクル発生（発音のたびに）
          const eyeRForBubble = this.r * this.scale * 0.42;
          emitBubbles(this.x, this.y, this.color, eyeRForBubble, 1 + (isJoin ? 1 : 0));

          if (this.colorKey === 'PURPLE') {
            // ★ パープル（ベース）シーケンス
            if (!isJoin) {
              // ソロ: E根音のみ、低密度ランダム
              if (Math.random() > 0.6) {
                const bassFreq = E_MAJOR_SCALE[0] * 0.25; // E1
                audio._playWithResonance(audio.playElectricBass.bind(audio), bassFreq, schedTime, visibility, this.panner, false, 'PURPLE');
              }
            } else {
              // Join: ベースラインパターン
              const patIdx = stepInMeasure;
              const degree = this.bassPattern[patIdx];
              let octMult = hasSameNeighbor ? 0.5 : 0.25; // 同色いれば1オクターブ上
              const bassFreq = E_MAJOR_SCALE[degree] * octMult;
              audio._playWithResonance(audio.playElectricBass.bind(audio), bassFreq, schedTime, visibility, this.panner, true, 'PURPLE');
              // 8ステップ周期でパターン再生成
              if (patIdx === 7) this.generateBassPattern();
            }
          } else {
            // ★ ピアノ / マリンバ のホット/コールド方式
            let freqBase;
            if (!isJoin) {
              // ソロ: 従来通りサイズ比例
              const baseScaleIdx = Math.min(7, Math.floor(sizeFactor * 4));
              switch(this.colorKey) {
                case 'BLUE_L':
                  freqBase = E_MAJOR_SCALE[baseScaleIdx] * 1.0;
                  audio._playWithResonance(audio.playPiano.bind(audio), freqBase, schedTime, visibility, this.panner, false, this.colorKey);
                  break;
                case 'BLUE_P':
                  freqBase = E_MAJOR_SCALE[baseScaleIdx] * 0.5;
                  audio._playWithResonance(audio.playPiano.bind(audio), freqBase, schedTime, visibility, this.panner, false, this.colorKey);
                  break;
                case 'TEAL':
                  freqBase = E_MAJOR_SCALE[Math.max(0, Math.min(7, 3 + Math.floor(sizeFactor * 4)))] * 4.0;
                  audio._playWithResonance(audio.playMarimba.bind(audio), freqBase, schedTime, visibility, this.panner, false, this.colorKey);
                  break;
                case 'GREEN':
                  freqBase = E_MAJOR_SCALE[Math.min(7, Math.floor(sizeFactor * 4))] * 4.0;
                  audio._playWithResonance(audio.playMarimba.bind(audio), freqBase, schedTime, visibility, this.panner, false, this.colorKey);
                  break;
              }
            } else {
              // ★ Join時: ホット/コールド方式
              // 強拍(0,4ステップ)はトニック優先、それ以外はコールドから選ぶ
              const isStrongBeat = (stepInMeasure === 0 || stepInMeasure === 4);
              const scaleIdx = this.selectJoinFreq(isStrongBeat);

              // 同色個体が周囲にいる場合は密度アップ（追加音）
              const densityBonus = hasSameNeighbor ? 0.7 : 1.0;

              switch(this.colorKey) {
                case 'BLUE_L':
                  freqBase = E_MAJOR_SCALE[scaleIdx] * 1.0;
                  audio._playWithResonance(audio.playPiano.bind(audio), freqBase, schedTime, visibility * densityBonus, this.panner, true, this.colorKey);
                  if (hasSameNeighbor && Math.random() > 0.5) {
                    const altIdx = this.freqPool.pickCold(true);
                    audio.playPiano(E_MAJOR_SCALE[altIdx] * 2.0, schedTime + 0.02, visibility * 0.3, this.panner);
                  }
                  break;
                case 'BLUE_P':
                  freqBase = E_MAJOR_SCALE[scaleIdx] * 0.5;
                  audio._playWithResonance(audio.playPiano.bind(audio), freqBase, schedTime, visibility * densityBonus, this.panner, true, this.colorKey);
                  if (hasSameNeighbor && Math.random() > 0.5) {
                    const altIdx = this.freqPool.pickCold(true);
                    audio.playPiano(E_MAJOR_SCALE[altIdx] * 1.0, schedTime + 0.02, visibility * 0.3, this.panner);
                  }
                  break;
                case 'TEAL':
                  freqBase = E_MAJOR_SCALE[scaleIdx] * 4.0;
                  audio._playWithResonance(audio.playMarimba.bind(audio), freqBase, schedTime, visibility * densityBonus, this.panner, true, this.colorKey);
                  if (hasSameNeighbor && Math.random() > 0.6) {
                    const altIdx = this.freqPool.pickCold(true);
                    audio.playMarimba(E_MAJOR_SCALE[altIdx] * 4.0, schedTime + 0.03, visibility * 0.35, this.panner);
                  }
                  break;
                case 'GREEN':
                  freqBase = E_MAJOR_SCALE[scaleIdx] * 4.0;
                  audio._playWithResonance(audio.playMarimba.bind(audio), freqBase, schedTime, visibility * densityBonus, this.panner, true, this.colorKey);
                  if (hasSameNeighbor && Math.random() > 0.6) {
                    const altIdx = this.freqPool.pickCold(true);
                    audio.playMarimba(E_MAJOR_SCALE[altIdx] * 8.0, schedTime + 0.03, visibility * 0.25, this.panner);
                  }
                  break;
              }
            }
          }
        }
      }
    }

    this.handleInteractions();

    // クラゲ漂い: 個体ごとの低周波正弦波ドリフト（方向性のない緩やかな揺れ）
    const driftT = t_sec * CONFIG.PHYSICS.DRIFT_FREQ_BASE;
    const driftAmp = CONFIG.PHYSICS.DRIFT_AMP;
    // seedで位相をずらし、個体ごとに異なるリズムで揺れる
    // X/Yで周波数を微妙にずらして円を描かず不規則に
    this.vx += Math.sin(driftT * 1.0 + this.seed) * driftAmp * 0.012;
    this.vy += Math.sin(driftT * 0.73 + this.seed * 1.3) * driftAmp * 0.012;
    // 微小ランダム（完全にパターン化しないための揺らぎ）
    this.vx += (Math.random() - 0.5) * CONFIG.PHYSICS.RANDOM_DRIFT;
    this.vy += (Math.random() - 0.5) * CONFIG.PHYSICS.RANDOM_DRIFT;

    this.vx *= CONFIG.PHYSICS.DAMPING;
    this.vy *= CONFIG.PHYSICS.DAMPING;
    this.x += this.vx; this.y += this.vy;

    // 壁: 強制反射ではなく緩やかに押し戻す
    const currentR = this.r * this.currentPulse * this.scale * (1 + this.joinEnergy * 0.35);
    const margin = currentR + 10;
    if (this.x < margin) { this.vx += (margin - this.x) * 0.04; }
    if (this.x > W - margin) { this.vx -= (this.x - (W - margin)) * 0.04; }
    if (this.y < margin) { this.vy += (margin - this.y) * 0.04; }
    if (this.y > H - margin) { this.vy -= (this.y - (H - margin)) * 0.04; }
    // 壁の外に出た場合のフォールバック
    this.x = Math.max(margin, Math.min(W - margin, this.x));
    this.y = Math.max(margin, Math.min(H - margin, this.y));
  }

  handleInteractions() {
    const now = performance.now();
    this.isJoinCandidate = false;

    if (this.partner) {
      const dx = this.partner.x - this.x, dy = this.partner.y - this.y;
      const d = Math.hypot(dx, dy);

      if (d > CONFIG.BREAK_DIST || this.partner.state === 'integrated') {
        this.breakJoin();
      } else {
        const myS = this.scale * this.currentPulse * (1 + this.joinEnergy * 0.35);
        const pS = this.partner.scale * this.partner.currentPulse * (1 + this.partner.joinEnergy * 0.35);
        const myBodyR = this.r * myS;
        const pBodyR = this.partner.r * pS;
        const myEyeR = myBodyR * 0.42;
        const pEyeR = pBodyR * 0.42;
        const bigEyeR = Math.max(myEyeR, pEyeR);
        const targetDist = myBodyR + pBodyR + bigEyeR * 2;

        // 距離を直接固定（バネなし）: seedで制御側を決め位置を補正
        if (this.seed > this.partner.seed && d > 0.001) {
          const mid = { x: (this.x + this.partner.x) * 0.5, y: (this.y + this.partner.y) * 0.5 };
          const nx = dx / d, ny = dy / d;
          const half = targetDist * 0.5;
          this.x = mid.x - nx * half;
          this.y = mid.y - ny * half;
          this.partner.x = mid.x + nx * half;
          this.partner.y = mid.y + ny * half;
          // 速度も中点基準に揃える（共通の漂い速度を維持）
          const mvx = (this.vx + this.partner.vx) * 0.5;
          const mvy = (this.vy + this.partner.vy) * 0.5;
          this.vx = mvx; this.vy = mvy;
          this.partner.vx = mvx; this.partner.vy = mvy;
        }
      }
    }

    // ★ Join制限: アクティブなペア数が MAX_JOIN_PAIRS(=1) 未満の場合のみ新規Joinを許可
    const activeJoins = entities.filter(e => e.partner && e.state !== 'integrated').length / 2;

    // ★ ヌシの白目エリア回避（体はすり抜けるが目には入れない）
    if (nushi && nushi.isAlive) {
      const ndx = nushi.x - this.x, ndy = nushi.y - this.y;
      const nd = Math.hypot(ndx, ndy);
      const avoidR = nushi.collisionR * CONFIG.PHYSICS.AVOIDANCE_RANGE;
      if (nd < avoidR && nd > 0.001) {
        const ang = Math.atan2(ndy, ndx);
        const power = (1.0 - nd / avoidR) * CONFIG.PHYSICS.AVOIDANCE_FORCE;
        this.vx -= Math.cos(ang) * power;
        this.vy -= Math.sin(ang) * power;
        // 完全に重なった場合は押し返す
        if (nd < nushi.collisionR) {
          const overlap = nushi.collisionR - nd;
          this.vx -= Math.cos(ang) * overlap * CONFIG.PHYSICS.COLLISION_STRENGTH;
          this.vy -= Math.sin(ang) * overlap * CONFIG.PHYSICS.COLLISION_STRENGTH;
        }
      }
    }

    for (let other of entities) {
      if (other === this || other.state === 'integrated') continue;
      const dx = other.x - this.x, dy = other.y - this.y;
      const d = Math.hypot(dx, dy);
      const myR = this.r * this.currentPulse * this.scale * (1 + this.joinEnergy * 0.35);
      const otherR = other.r * other.currentPulse * other.scale * (1 + other.joinEnergy * 0.35);
      const avoidanceDist = (myR + otherR) * CONFIG.PHYSICS.AVOIDANCE_RANGE;

      if (d < avoidanceDist) {
        const ang = Math.atan2(dy, dx);
        const avoidancePower = (1.0 - d / avoidanceDist) * CONFIG.PHYSICS.AVOIDANCE_FORCE;
        this.vx -= Math.cos(ang) * avoidancePower;
        this.vy -= Math.sin(ang) * avoidancePower;

        if (d < (myR + otherR)) {
          const overlap = (myR + otherR) - d;
          this.vx -= Math.cos(ang) * overlap * CONFIG.PHYSICS.COLLISION_STRENGTH;
          this.vy -= Math.sin(ang) * overlap * CONFIG.PHYSICS.COLLISION_STRENGTH;
        }
      }

      if (!this.partner && !other.partner && !this.isRare && !other.isRare &&
          activeJoins < CONFIG.MAX_JOIN_PAIRS &&
          other.colorKey !== this.colorKey &&
          other.state === 'live' && this.state === 'live' &&
          now - this.lastBreakTime > 2000 && now - other.lastBreakTime > 2000 &&
          d < CONFIG.CONN_DIST) {
        // ★ Join条件: 両者の残りライフが最低保証時間（16秒）以上あること
        const myRemaining = this.maxAge - (now - this.startTime);
        const otherRemaining = other.maxAge - (now - other.startTime);
        const minLife = CONFIG.JOIN_MIN_LIFE_MS;
        if (myRemaining >= minLife && otherRemaining >= minLife) {
          this.isJoinCandidate = true;
          if (Math.abs(this.lastBeatTime - other.lastBeatTime) < 100 && Math.random() < CONFIG.JOIN_PROBABILITY) {
            this.establishJoin(other);
          }
        }
      }
    }
  }

  establishJoin(target) {
    if (this.isRare || target.isRare) return;
    this.partner = target;
    target.partner = this;
    this.joinTime = performance.now();
    target.joinTime = performance.now();
    const now = performance.now();
    const minGuarantee = CONFIG.JOIN_MIN_LIFE_MS;
    const extendIfNeeded = (entity) => {
      const remaining = entity.maxAge - (now - entity.startTime);
      const extended = remaining < minGuarantee;
      if (extended) entity.maxAge += (minGuarantee - remaining);
      return { remaining: (remaining/1000).toFixed(1), extended };
    };
    const r1 = extendIfNeeded(this);
    const r2 = extendIfNeeded(target);
    nushiLog(`[JOIN] established: ${this.colorKey}(rem=${r1.remaining}s${r1.extended?'+ext':''}) + ${target.colorKey}(rem=${r2.remaining}s${r2.extended?'+ext':''})`);
  }

  breakJoin() {
    if (this.partner) {
      const p = this.partner;
      const joinDuration = ((performance.now() - this.joinTime) / 1000).toFixed(1);
      const myRemaining = ((this.maxAge - (performance.now() - this.startTime)) / 1000).toFixed(1);
      const pRemaining = ((p.maxAge - (performance.now() - p.startTime)) / 1000).toFixed(1);
      nushiLog(`[JOIN] break after ${joinDuration}s: ${this.colorKey}(rem=${myRemaining}s) ${p.colorKey}(rem=${pRemaining}s)`);
      this.partner = null;
      this.lastBreakTime = performance.now();
      if (p.partner === this) p.partner = null;
    }
  }

  initiateAutoDivision() {
    this.state = 'returning';
    this.returnStartTime = performance.now();
    this.dividing = 1;
    const childR = Math.max(CONFIG.R_MIN, this.r * 0.75);
    for (let i = 0; i < 2; i++) {
      const ang = Math.random() * Math.PI * 2;
      const off = this.r * 0.2;
      spawn(this.x + Math.cos(ang) * off, this.y + Math.sin(ang) * off, childR, this.colorKey, true);
    }
  }

  draw(targetCtx) {
    if (this.alpha <= 0) return;
    const s = this.scale * this.currentPulse * (1 + this.dividing * 0.35) * (1 + this.joinEnergy * 0.35);
    const bodyR = this.r * s;
    const t_sec = ft * 0.001;

    targetCtx.save();
    targetCtx.translate(this.x, this.y);
    targetCtx.globalAlpha = Math.max(0, Math.min(1, this.alpha));

    // Resonance glow
    if (this.resonance > 0.001) {
      targetCtx.save();
      const glowR = bodyR * (1 + this.resonance * 0.45);
      const grad = targetCtx.createRadialGradient(0, 0, bodyR, 0, 0, glowR);
      grad.addColorStop(0, this.color);
      grad.addColorStop(1, 'transparent');
      targetCtx.globalAlpha = this.resonance * 0.45 * this.alpha;
      targetCtx.beginPath(); targetCtx.arc(0, 0, glowR, 0, Math.PI * 2);
      targetCtx.fillStyle = grad; targetCtx.fill();
      targetCtx.restore();
    }

    if (this.isUrchin && this.state !== 'returning') {
      const angles = [0, Math.PI/4, Math.PI/2, 3*Math.PI/4, Math.PI, 5*Math.PI/4, 3*Math.PI/2, 7*Math.PI/4];
      targetCtx.strokeStyle = this.color;
      targetCtx.lineWidth = 4 * s;
      targetCtx.lineCap = 'round';
      angles.forEach(ang => {
        const spikeLen = bodyR + (14 * s) + Math.sin(t_sec * 4.0 + ang * 2) * (2 * s);
        targetCtx.beginPath();
        targetCtx.moveTo(0, 0);
        targetCtx.lineTo(Math.cos(ang) * spikeLen, Math.sin(ang) * spikeLen);
        targetCtx.stroke();
      });
    }

    targetCtx.beginPath();
    targetCtx.arc(0, 0, bodyR, 0, Math.PI * 2);
    targetCtx.fillStyle = this.color;
    targetCtx.fill();

    // ★ 結合中かどうかにかかわらず drawNormalEye を使う
    // ★ 結合中の視線: パートナーの方向へ緩やかに追従
    if (this.partner) {
      this.drawNormalEyeToward(targetCtx, s, t_sec, this.partner);
    } else {
      this.drawNormalEye(targetCtx, s, t_sec);
    }

    targetCtx.restore();
  }

  drawNormalEye(targetCtx, s, t) {
    const eyeR = this.r * 0.42 * (1.0 + (this.resonance * 0.1)) * s;
    const m = getOutwardEyeMotion(t, this.seed);

    const currentBodyR = this.r * s;
    const ex = m.ex * (currentBodyR - eyeR) * 0.98;
    const ey = m.ey * (currentBodyR - eyeR) * 0.98;
    targetCtx.save();
    targetCtx.translate(ex, ey);
    targetCtx.beginPath();
    targetCtx.arc(0, 0, eyeR, 0, Math.PI * 2);
    targetCtx.fillStyle = PALETTE.WHITE;
    targetCtx.fill();
    targetCtx.beginPath();
    targetCtx.arc(m.ex * eyeR * 0.55, m.ey * eyeR * 0.55, eyeR * 0.45, 0, Math.PI * 2);
    targetCtx.fillStyle = PALETTE.BLUE_P;
    targetCtx.fill();
    targetCtx.restore();
  }

  // ★ 結合中: Join直後は真っ直ぐ見つめ合い、時間経過で自由な視線が混ざる
  drawNormalEyeToward(targetCtx, s, t, partner) {
    const eyeR = this.r * 0.42 * (1.0 + (this.resonance * 0.1)) * s;
    const ang = Math.atan2(partner.y - this.y, partner.x - this.x);
    const lookM = { ex: Math.cos(ang), ey: Math.sin(ang) };

    // Join経過時間に応じてブレンド比を変化
    // 0〜5秒: 完全にパートナー方向（lookWeight=1.0）
    // 5〜20秒: 徐々に自由視線が混ざる（lookWeight: 1.0 → 0.5）
    // 20秒以降: 0.5で安定（ゆっくり横見したりする）
    const elapsed = (performance.now() - this.joinTime) / 1000;
    const lookWeight = elapsed < 5
      ? 1.0
      : Math.max(0.5, 1.0 - (elapsed - 5) / 30);

    const freeM = getOutwardEyeMotion(t, this.seed);
    const blendedEx = lookM.ex * lookWeight + freeM.ex * (1 - lookWeight);
    const blendedEy = lookM.ey * lookWeight + freeM.ey * (1 - lookWeight);
    const len = Math.hypot(blendedEx, blendedEy);
    const bm = len > 0 ? { ex: blendedEx / len, ey: blendedEy / len } : lookM;

    const currentBodyR = this.r * s;
    const ex = bm.ex * (currentBodyR - eyeR) * 0.98;
    const ey = bm.ey * (currentBodyR - eyeR) * 0.98;
    targetCtx.save();
    targetCtx.translate(ex, ey);
    targetCtx.beginPath();
    targetCtx.arc(0, 0, eyeR, 0, Math.PI * 2);
    targetCtx.fillStyle = PALETTE.WHITE;
    targetCtx.fill();
    targetCtx.beginPath();
    targetCtx.arc(bm.ex * eyeR * 0.55, bm.ey * eyeR * 0.55, eyeR * 0.45, 0, Math.PI * 2);
    targetCtx.fillStyle = PALETTE.BLUE_P;
    targetCtx.fill();
    targetCtx.restore();
  }
}

/* ================================================================
   HDR → SDR TONEMAPPING PIPELINE
================================================================ */
async function loadImageSDR(file) {
  // createImageBitmapで先にデコード（HEIC/HDR含む各種フォーマット対応）
  let bitmap;
  try {
    bitmap = await createImageBitmap(file);
  } catch(e) {
    // フォールバック: Image要素経由
    bitmap = await new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        createImageBitmap(img).then(bmp => {
          URL.revokeObjectURL(url);
          resolve(bmp);
        }).catch(reject);
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
      img.src = url;
    });
  }

  // オフスクリーンキャンバスにSDRとして描画（ブラウザがトーンマップ実施）
  const oc = document.createElement('canvas');
  oc.width = bitmap.width;
  oc.height = bitmap.height;
  const oc_ctx = oc.getContext('2d', { colorSpace: 'srgb' });
  oc_ctx.drawImage(bitmap, 0, 0);

  // 輝度ピーク検出 → 暗すぎる場合のみReinhard補正
  let imageData;
  try {
    imageData = oc_ctx.getImageData(0, 0, oc.width, oc.height);
  } catch(e) {
    // getImageDataが失敗した場合はそのままbitmapを返す
    return bitmap;
  }
  const data = imageData.data;
  let maxLum = 0;
  for (let i = 0; i < data.length; i += 4) {
    const lum = 0.2126*(data[i]/255) + 0.7152*(data[i+1]/255) + 0.0722*(data[i+2]/255);
    if (lum > maxLum) maxLum = lum;
  }
  if (maxLum < 0.4 && maxLum > 0) {
    const scale = Math.min(2.5, 0.9 / maxLum);
    for (let i = 0; i < data.length; i += 4) {
      for (let c = 0; c < 3; c++) {
        let v = data[i + c] / 255;
        v = Math.min(1, v * scale);
        data[i + c] = Math.round(v * 255);
      }
    }
    oc_ctx.putImageData(imageData, 0, 0);
  }

  return await createImageBitmap(oc);
}

/* ================================================================
   BACKGROUND DRAW (cover fit)
================================================================ */
function drawBackground() {
  if (!bgImage) {
    // デフォルト白背景（グラデーション）
    ctx.clearRect(0, 0, W, H);
    return;
  }
  // object-fit: cover 相当
  const imgW = bgImage.width, imgH = bgImage.height;
  const scale = Math.max(W / imgW, H / imgH);
  const dw = imgW * scale, dh = imgH * scale;
  const dx = (W - dw) / 2, dy = (H - dh) / 2;
  ctx.drawImage(bgImage, dx, dy, dw, dh);
}

/* ================================================================
   DYNAMIC RESIZING
================================================================ */
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  const cv = document.getElementById('canvas');
  if (cv) {
    cv.width = W * dpr; cv.height = H * dpr;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx = cv.getContext('2d');
    ctx.scale(dpr, dpr);
  }
  const areaRatio = (W * H) / (400 * 800);
  maxPopAdjusted = Math.max(5, Math.min(14, Math.floor(CONFIG.MAX_POP_BASE * Math.sqrt(areaRatio))));

  entities.forEach(e => {
    const currentR = e.r * e.scale;
    const margin = currentR + 10;
    e.x = Math.max(margin, Math.min(W - margin, e.x));
    e.y = Math.max(margin, Math.min(H - margin, e.y));
  });
}

function resizeOpeningCanvas() {
  const oCv = document.getElementById('o-canvas');
  if (!oCv) return 220;
  const calculatedSize = Math.max(120, Math.min(220, window.innerWidth * 0.6, window.innerHeight * 0.35));
  oCv.width = calculatedSize * dpr;
  oCv.height = calculatedSize * dpr;
  oCv.style.width = calculatedSize + 'px';
  oCv.style.height = calculatedSize + 'px';
  oCtx = oCv.getContext('2d');
  oCtx.scale(dpr, dpr);
  return calculatedSize;
}

function spawn(x, y, r = null, colorKey = null, isFromDivision = false, isInitial = false) {
  if (!colorKey) {
    const keys = ['BLUE_P', 'BLUE_L', 'TEAL', 'GREEN', 'PURPLE'];
    const counts = {};
    keys.forEach(k => counts[k] = 0);
    entities.forEach(e => { if (e.state !== 'integrated') counts[e.colorKey]++; });
    colorKey = keys.sort((a, b) => counts[a] - counts[b])[0];
  }
  const newEntity = new Komyaku(x, y, r, colorKey, isFromDivision, isInitial);
  entities.push(newEntity);
  return newEntity;
}

/* ================================================================
   MAIN LOOP
================================================================ */
function mainLoop(ts) {
  if (!running) return;

  ft = ts;
  ctx.clearRect(0, 0, W, H);

  // 背景描画
  if (bgImage) {
    drawBackground();
  }

  if (isPlaying) {
    const aliveEntities = entities.filter(e => e.state !== 'integrated');
    if (ts - lastAuto > BEAT_DURATION * 1000 * CONFIG.AUTO_SPAWN_BEATS) {
      if (aliveEntities.length < maxPopAdjusted) {
        spawn(Math.random() * W, Math.random() * H);
      }
      lastAuto = ts; // こみゃく満員時も更新し、毎フレーム判定を防ぐ
    }
    // ★ ヌシのスポーン試行: 独立タイマーで一定間隔ごとに1回のみ判定
    if (ts - lastNushiCheck > BEAT_DURATION * 1000 * CONFIG.AUTO_SPAWN_BEATS) {
      trySpawnNushi();
      lastNushiCheck = ts;
    }
    // ★ 描画順: パーティクル(背面) → ヌシ(中間) → こみゃく(前面)
    particles.forEach(p => { p.update(); p.draw(ctx); });
    particles = particles.filter(p => !p.dead);

    if (nushi && nushi.isAlive) { nushi.update(); nushi.draw(ctx); }
    else if (nushi && !nushi.isAlive) {
      nushiLog(`[NUSHI] cleared (null) at ${(performance.now()/1000).toFixed(1)}s`);
      nushi = null;
    }

    entities.forEach(e => { e.update(); e.draw(ctx); });
    entities = entities.filter(e => e.state !== 'integrated');
  } else {
    // 一時停止中: 位置固定・描画のみ行う
    entities.forEach(e => {
      // ライフは消耗（stateのみ進行させる、物理は止める）
      const now = performance.now();
      if (e.state === 'born') {
        const elapsed = now - e.startTime;
        e.scale = Math.min(1, elapsed / 1500);
        if (e.scale >= 1) e.state = 'live';
      } else if (e.state === 'live') {
        const lifeElapsed = now - e.startTime;
        if (lifeElapsed > e.maxAge) {
          e.state = 'returning';
          e.returnStartTime = now;
        }
      } else if (e.state === 'returning') {
        const returnElapsed = now - e.returnStartTime;
        const progress = Math.min(1, returnElapsed / 3000);
        e.alpha = 1 - progress;
        e.scale = 1 - progress * 0.3;
        if (progress >= 1) { e.state = 'integrated'; e.breakJoin(); }
      }
      e.draw(ctx);
    });
    entities = entities.filter(e => e.state !== 'integrated');

    // 一時停止中もパーティクルはフェード継続
    particles.forEach(p => { p.update(); p.draw(ctx); });
    particles = particles.filter(p => !p.dead);
    if (nushi && nushi.isAlive) { nushi.draw(ctx); }
  }

  document.getElementById('pop-count').textContent = entities.length;
  requestAnimationFrame(mainLoop);
}

/* ================================================================
   OPENING ANIMATION
================================================================ */
let oCtx = null;
function initOpening() {
  const oCv = document.getElementById('o-canvas');
  if (!oCv) return;
  resizeOpeningCanvas();

  function oLoop(ts) {
    if (running) return;
    const size = resizeOpeningCanvas();
    oCtx.clearRect(0, 0, size, size);

    const t = ts * 0.001;
    const cx = size / 2, cy = size / 2;
    const bpmFreq = getBPMFreq(0.5);
    const breath = 1 + Math.sin(t * bpmFreq * Math.PI * 2) * 0.012;
    const bodyR = (size * 0.22) * breath;

    const angles = [0, Math.PI/4, Math.PI/2, 3*Math.PI/4, Math.PI, 5*Math.PI/4, 3*Math.PI/2, 7*Math.PI/4];
    oCtx.strokeStyle = PALETTE.PURPLE;
    oCtx.lineWidth = Math.max(2.5, size * 0.022);
    oCtx.lineCap = 'round';
    angles.forEach(ang => {
      const spikeLen = bodyR + (size * 0.11) + Math.sin(t * 4.0 + ang * 2) * (size * 0.014);
      oCtx.beginPath();
      oCtx.moveTo(cx, cy);
      oCtx.lineTo(cx + Math.cos(ang) * spikeLen, cy + Math.sin(ang) * spikeLen);
      oCtx.stroke();
    });

    oCtx.beginPath();
    oCtx.arc(cx, cy, bodyR, 0, Math.PI * 2);
    oCtx.fillStyle = PALETTE.PURPLE;
    oCtx.fill();

    const m = getOutwardEyeMotion(t, 0);
    const eyeR = bodyR * 0.42;
    const maxOffset = bodyR - eyeR;
    const ex = cx + m.ex * maxOffset * 0.98;
    const ey = cy + m.ey * maxOffset * 0.98;

    oCtx.beginPath();
    oCtx.arc(ex, ey, eyeR, 0, Math.PI * 2);
    oCtx.fillStyle = PALETTE.WHITE;
    oCtx.fill();

    oCtx.beginPath();
    oCtx.arc(ex + m.ex * eyeR * 0.55, ey + m.ey * eyeR * 0.55, eyeR * 0.45, 0, Math.PI * 2);
    oCtx.fillStyle = PALETTE.BLUE_P;
    oCtx.fill();

    requestAnimationFrame(oLoop);
  }
  requestAnimationFrame(oLoop);
}

/* ================================================================
   UI CONTROLS
================================================================ */
function initUI() {
  // Play / Pause
  const btnPlayPause = document.getElementById('btn-play-pause');
  const iconPlay = document.getElementById('icon-play');
  const iconPause = document.getElementById('icon-pause');

  btnPlayPause.addEventListener('click', () => {
    isPlaying = !isPlaying;
    if (isPlaying) {
      iconPlay.style.display = 'none';
      iconPause.style.display = 'block';
      if (audio.ctx && audio.ctx.state === 'suspended') {
        audio.ctx.resume();
      }
    } else {
      iconPlay.style.display = 'block';
      iconPause.style.display = 'none';
      // リバーブの残響は自然減衰（suspendしない）
    }
  });

  // Settings toggle
  const overlay = document.getElementById('settings-overlay');
  const btnSettings = document.getElementById('btn-settings');
  btnSettings.addEventListener('click', () => overlay.classList.add('open'));
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });

  // Volume slider
  const volSlider = document.getElementById('vol-slider');
  const volVal = document.getElementById('vol-val');
  volSlider.addEventListener('input', () => {
    const v = parseInt(volSlider.value);
    volVal.textContent = v;
    // CSSカスタムプロパティで塗りつぶし幅を更新
    volSlider.style.setProperty('--pct', v + '%');
    if (audio.initialized) {
      audio.setMasterVolume(v / 100);
    }
  });
  // 初期値のCSS反映
  volSlider.style.setProperty('--pct', '80%');

  // Tempo toggle
  document.querySelectorAll('.tempo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tempo-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const newBpm = parseInt(btn.dataset.bpm);
      CONFIG.BPM = newBpm;
      BEAT_DURATION = 60 / newBpm;
      if (audio.initialized) {
        audio.updateTiming();
      }
      // maxAgeを再計算（BPMに依存）
      entities.forEach(e => {
        // ライフタイム再スケール
        e.maxAge = (30 + Math.random() * 30) * (1000 * (60 / CONFIG.BPM));
      });
    });
  });

  // Background upload
  const bgUploadBtn = document.getElementById('bg-upload-btn');
  const bgFileInput = document.getElementById('bg-file-input');
  const bgResetBtn = document.getElementById('bg-reset-btn');

  bgUploadBtn.addEventListener('click', () => bgFileInput.click());
  bgFileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      bgImage = await loadImageSDR(file);
      // メインキャンバスの背景をgradientからsolidに
      document.getElementById('main').style.background = 'none';
    } catch(err) {
      console.error('Background image load failed:', err);
    }
    bgFileInput.value = '';
  });

  bgResetBtn.addEventListener('click', () => {
    bgImage = null;
    document.getElementById('main').style.background = 'radial-gradient(circle at center, var(--white) 0%, var(--bg) 100%)';
  });

}

/* ================================================================
   BOOT
================================================================ */
function boot() {
  dpr = window.devicePixelRatio || 1;
  initOpening();



  document.getElementById('o-btn').onclick = () => {
    audio.init();
    document.getElementById('opening').classList.add('gone');
    document.getElementById('main').classList.add('visible');
    running = true;
    resize();
    ['BLUE_P', 'BLUE_L', 'TEAL', 'GREEN', 'PURPLE'].forEach(k =>
      spawn(Math.random() * W, Math.random() * H, null, k, false, true)
    );
    // 起動時にもヌシ出現を試みる
    trySpawnNushi();
    requestAnimationFrame(mainLoop);
    initUI();
  };
}

window.addEventListener('resize', () => {
  if (running) { resize(); } else { resizeOpeningCanvas(); }
});

boot();
</script>
